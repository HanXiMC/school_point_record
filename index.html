<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>14班积分分数统计平台</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <!-- 引入 Remix Icon 图标库 -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- 引入可爱/活泼的字体 (站酷快乐体 + Nunito圆体) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #1976d2;
            --bg-gradient: linear-gradient(135deg, #e0f7fa 0%, #e1bee7 100%, #bbdefb 200%);
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-border: rgba(255, 255, 255, 0.6);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--bg-gradient);
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'ZCOOL KuaiLe', 'Nunito', 'Comic Sans MS', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding-bottom: 50px; 
            letter-spacing: 1px;
        }

        /* --- 顶部控制栏 --- */
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 5%;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header-controls h1 {
            color: #333;
            margin: 0;
            font-size: 28px;
            line-height: 1.4;
            text-shadow: 1px 1px 3px rgba(255,255,255,0.8);
        }

        .header-controls h1 span {
            display: block;
            font-size: 18px;
            color: var(--primary-color);
            opacity: 0.9;
            margin-top: 5px;
        }

        .toggle-btn {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: var(--glass-shadow);
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            color: #555;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .toggle-btn:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
            color: var(--primary-color);
        }

        /* --- 卡片容器 --- */
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 280px), 1fr));
            gap: 25px;
            padding: 0 5%;
            max-width: 1200px;
            margin: 0 auto;
            transition: all 0.4s ease;
        }

        /* 列表视图类 */
        .card-container.list-view {
            grid-template-columns: 1fr;
            max-width: 800px;
        }

        /* --- 卡片样式 --- */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 25px; 
            padding: 25px;
            box-shadow: var(--glass-shadow);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            overflow: hidden;
        }

        .list-view .card {
            flex-direction: row;
            align-items: center;
            padding: 20px 30px;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.15);
            background: rgba(255, 255, 255, 0.65);
        }

        .card-icon {
            font-size: 45px;
            color: var(--primary-color);
            background: rgba(255, 255, 255, 0.7);
            width: 75px;
            height: 75px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 22px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .card:hover .card-icon {
            transform: scale(1.15) rotate(5deg);
        }

        .card-content h3 {
            margin: 0 0 10px 0;
            color: #2c3e50;
            font-size: 24px;
        }

        .card-content p {
            margin: 0;
            color: #666;
            font-size: 16px;
            line-height: 1.6;
            font-family: 'Nunito', 'PingFang SC', sans-serif;
        }

        /* --- 密码验证弹窗  --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .glass-modal {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.9);
            border-radius: 28px;
            padding: 35px 30px;
            width: 90%;
            max-width: 360px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            transform: translateY(30px) scale(0.9);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }

        .modal-overlay.show .glass-modal {
            transform: translateY(0) scale(1);
        }

        .glass-modal h3 {
            margin-top: 0;
            color: #333;
            font-size: 26px;
        }

        .glass-modal input {
            width: 85%;
            padding: 14px 18px;
            margin: 15px 0 25px 0;
            border: 2px solid rgba(255,255,255,0.8);
            border-radius: 16px;
            background: rgba(255,255,255,0.6);
            outline: none;
            font-size: 18px;
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.06);
            transition: all 0.3s;
            text-align: center;
            font-family: 'Nunito', sans-serif;
        }

        .glass-modal input:focus {
            background: rgba(255,255,255,0.95);
            border-color: var(--primary-color);
            transform: scale(1.02);
        }

        .modal-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .modal-btns button {
            padding: 12px 25px;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-size: 18px;
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .btn-cancel {
            background: rgba(0,0,0,0.06);
            color: #666;
        }
        
        .btn-confirm {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 6px 15px rgba(25, 118, 210, 0.35);
        }

        .modal-btns button:hover {
            transform: translateY(-4px);
        }
        
        .btn-confirm:hover {
            box-shadow: 0 10px 20px rgba(25, 118, 210, 0.45);
        }

        /* ===========
           移动端适配
           =========== */
        @media (max-width: 768px) {
            .header-controls { 
                flex-direction: column; 
                text-align: center; 
                padding: 20px 15px;
                gap: 15px;
            }
            .header-controls h1 { 
                font-size: 24px; 
            }
            .header-controls h1 span {
                font-size: 15px;
            }
            .toggle-btn {
                width: 100%; 
                justify-content: center;
                padding: 12px;
            }

            .card-container {
                grid-template-columns: 1fr; /* 手机强制单列 */
                padding: 0 15px;
                gap: 18px;
            }

            .card {
                padding: 20px 15px;
                align-items: center;
                text-align: center;
            }

            .list-view .card { 
                flex-direction: column; 
                text-align: center; 
                padding: 20px 15px;
            }

            .card-icon {
                width: 60px;
                height: 60px;
                font-size: 32px;
            }

            .card-content h3 { font-size: 20px; }
            .card-content p { font-size: 14px; }

            /* 弹窗在小屏幕上的适配 */
            .glass-modal {
                width: 85%;
                padding: 25px 20px;
            }
            .glass-modal h3 {
                font-size: 22px;
            }
            .glass-modal input {
                width: 80%;
                padding: 12px 15px;
                font-size: 16px;
                margin: 15px 0 20px 0;
            }
            .modal-btns button {
                padding: 10px 20px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <!-- 顶部标题和布局控制 -->
    <div class="header-controls">
        <h1>
            14班
            <span>积分登记平台</span>
        </h1>
        <button class="toggle-btn" onclick="toggleLayout()">
            <i class="ri-layout-grid-fill" id="layoutIcon"></i>
            <span id="layoutText">切换列表视图</span>
        </button>
    </div>

    <!-- 主体卡片容器 -->
    <div class="card-container" id="cardContainer">
        
        <!--
             以后想加新板块，只需复制下面这个 div，然后修改其中的：
             1. data-url="你的新链接"
             2. data-pwd="你的混淆密码"（如果不加密，留空即可：data-pwd=""）
             3. 修改里面的标题、描述和图标图标（ri-xxx-line）
        -->

        <!--
            混淆后的密码获取:(控制台)
                btoa(encodeURIComponent("password")).split('').reverse().join('');
        --!>
        
        <!-- 模块 1：积分加分 -->
        <div class="card" 
             data-url="https://class14.rczx.asia/moral_add.html" 
             data-pwd="" 
             onclick="navigate(this)">
            <div class="card-icon"><i class="ri-play-list-add-line"></i></div>
            <div class="card-content">
                <h3>积分加分</h3>
                <p></p>
            </div>
        </div>

        <!-- 模块 2：积分量化减分 -->
        <div class="card" 
             data-url="https://class14.rczx.asia/moral_substract.html" 
             data-pwd="" 
             onclick="navigate(this)">
            <div class="card-icon"><i class="ri-indent-decrease"></i></i></div>
            <div class="card-content">
                <h3>积分减分</h3>
                <p></p>
            </div>
        </div>


        <!-- 模块 3：仪表盘 -->
        <div class="card" 
             data-url="https://class14.rczx.asia/dashboard.html" 
             data-pwd="" 
             onclick="navigate(this)">
            <div class="card-icon"><i class="ri-dashboard-3-line"></i></div>
            <div class="card-content">
                <h3>仪表盘</h3>
                <p>查看每个人的详细积分分数明细</p>
            </div>
        </div>

        <!-- 模块 4：管理员 -->
        <div class="card" 
             data-url="https://class14.rczx.asia/admin.html" 
             data-pwd="" 
             onclick="navigate(this)">
            <div class="card-icon"><i class="ri-settings-3-line"></i></div>
            <div class="card-content">
                <h3>管理后台</h3>
                <p></p>
            </div>
        </div>
        
    </div>

    <!-- 密码验证弹窗 -->
    <div class="modal-overlay" id="pwdModal">
        <div class="glass-modal">
            <h3>🔒 安全验证</h3>
            <p style="font-size: 15px; color: #666; margin-bottom: 5px; font-family: 'Nunito', sans-serif;">该板块需要授权密码才能访问噢~</p>
            <input type="password" id="pwdInput" placeholder="请输入密码...">
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn-confirm" onclick="verifyPassword()">咻！进入</button>
            </div>
        </div>
    </div>

    <script>
        // === 布局切换功能 ===
        function toggleLayout() {
            const container = document.getElementById('cardContainer');
            const icon = document.getElementById('layoutIcon');
            const text = document.getElementById('layoutText');
            
            container.classList.toggle('list-view');
            
            if (container.classList.contains('list-view')) {
                icon.className = 'ri-layout-masonry-fill';
                text.innerText = '切换网格视图';
            } else {
                icon.className = 'ri-layout-grid-fill';
                text.innerText = '切换列表视图';
            }
        }

        // === 路由与密码验证逻辑 ===
        let pendingUrl = '';
        let correctPasswordHash = '';

        // 处理卡片点击，直接从 HTML 的 data 属性读取配置
        function navigate(element) {
            const url = element.getAttribute('data-url');
            const pwdRequirement = element.getAttribute('data-pwd');

            // 给定微小的延迟，让用户感受到按钮按下的弹性动画
            setTimeout(() => {
                if (pwdRequirement && pwdRequirement.trim() !== "") {
                    // 如果卡片配置了混淆密码，弹出验证窗口
                    openModal(url, pwdRequirement);
                } else {
                    // 如果没有密码配置，直接跳转
                    window.location.href = url;
                }
            }, 150);
        }

        // --- 弹窗逻辑 ---
        function openModal(url, pwdHash) {
            pendingUrl = url;
            correctPasswordHash = pwdHash;
            document.getElementById('pwdInput').value = ''; // 清空上次输入
            document.getElementById('pwdModal').classList.add('show');
            setTimeout(() => document.getElementById('pwdInput').focus(), 100);
        }

        function closeModal() {
            document.getElementById('pwdModal').classList.remove('show');
            pendingUrl = '';
            correctPasswordHash = '';
        }

        // 密码校验
        function verifyPassword() {
            const inputVal = document.getElementById('pwdInput').value;

            const inputHash = btoa(encodeURIComponent(inputVal)).split('').reverse().join('');
            
            if (inputHash === correctPasswordHash) {
                const targetUrl = pendingUrl;
                closeModal();
                window.location.href = targetUrl;
            } else {
                // 密码错误，提示
                alert('哎呀，密码不对噢，请再试一次！');
                document.getElementById('pwdInput').value = '';
                document.getElementById('pwdInput').focus();
            }
        }

        // 监听回车键提交密码
        document.getElementById('pwdInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') verifyPassword();
        });
    </script>
</body>
</html>
