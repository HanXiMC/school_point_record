<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>快照查看 - 历史数据</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --primary-color: #1976d2;
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.3);
        }

        body {
            background: linear-gradient(135deg, #e0f7fa 0%, #e1bee7 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .header {
            max-width: 1200px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }

        .header h1 { margin: 0; font-size: 24px; color: #333; display: flex; align-items: center; gap: 10px; }
        #backupTitle { color: #666; font-size: 14px; margin-top: 5px; }

        .card-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        .student-card {
            background: var(--glass-bg);
            backdrop-filter: blur(5px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .student-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.8);
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
        }

        .student-card .name { font-weight: bold; font-size: 18px; margin-bottom: 8px; color: #333; }
        .student-card .score { font-size: 24px; color: var(--primary-color); font-weight: 800; }

        /* 弹窗样式 */
        .detail-item {
            padding: 12px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .detail-item:last-child { border-bottom: none; }
        .points-add { color: #2e7d32; font-weight: bold; }
        .points-sub { color: #d32f2f; font-weight: bold; }
        
        .section-title {
            margin: 20px 0 10px;
            padding-left: 10px;
            border-left: 4px solid var(--primary-color);
            font-size: 16px;
            font-weight: bold;
        }

        .btn-close {
            background: #666; color: white; border: none; padding: 10px 20px;
            border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 5px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div>
            <h1><i class="ri-history-line"></i> 数据快照分析</h1>
            <div id="backupTitle">正在加载备份信息...</div>
        </div>
        <button class="btn-close" onclick="window.close()">
            <i class="ri-close-line"></i> 关闭页面
        </button>
    </div>

    <div class="card-container" id="studentGrid">
        </div>

    <div class="modal-overlay" id="detailModal">
        <div class="glass-modal" style="max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto;">
            <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 id="modalStudentName" style="margin:0"></h2>
                <div class="score">总分: <span id="modalScore"></span></div>
            </div>

            <div class="section-title">记录明细</div>
            <div id="detailsList"></div>

            <button class="btn-primary" style="margin-top:20px; width:100%" onclick="closeModal()">返回列表</button>
        </div>
    </div>

    <script>
        let snapshotData = [];
        const urlParams = new URLSearchParams(window.location.search);
        const backupName = urlParams.get('backup');

        // 初始化
        async function init() {
            if (!backupName) {
                alert('未指定备份名称，请从管理后台进入');
                return;
            }
            document.getElementById('backupTitle').innerText = "当前快照：" + backupName;
            await loadData();
        }

        // 加载数据
        async function loadData() {
            const grid = document.getElementById('studentGrid');
            try {
                const response = await fetch(`api/history.php?action=get_backup_data&backup=${backupName}`);

                if (!response.ok) throw new Error('后端接口响应错误');

                const data = await response.json();

                if (!Array.isArray(data)) {
                    throw new Error('数据格式错误，预期为数组');
                }

                snapshotData = data;
                grid.innerHTML = '';

                if (snapshotData.length === 0) {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:50px;">该备份中没有学生数据</div>';
                    return;
                }

                snapshotData.forEach(s => {
                    const card = document.createElement('div');
                    card.className = 'student-card';
                    card.innerHTML = `
                        <div class="name">${s.name || '未知'}</div>
                        <div class="score">${s.score ?? 0}</div>
                    `;
                    card.onclick = () => showDetail(s.uid);
                    grid.appendChild(card);
                });

                document.getElementById('backupTitle').innerText = `当前快照：${backupName} (共 ${snapshotData.length} 人)`;

            } catch (error) {
                console.error('Fetch Error:', error);
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; color:red; padding:50px;">
                    加载失败: ${error.message || '网络或后端接口异常'}
                </div>`;
            }
        }

        function showDetail(uid) {
            const student = snapshotData.find(s => String(s.uid) === String(uid));
            if (!student) {
                alert('找不到该学生信息');
                return;
            }

            document.getElementById('modalStudentName').innerText = student.name;
            document.getElementById('modalScore').innerText = student.score;

            const listDiv = document.getElementById('detailsList');
            listDiv.innerHTML = '';

            if (student.details && student.details.length > 0) {
                const sortedDetails = [...student.details].reverse();
                sortedDetails.forEach(d => {
                    const item = document.createElement('div');
                    item.className = 'detail-item';
                    const pointsClass = d.points >= 0 ? 'points-add' : 'points-sub';
                    const pointsPrefix = d.points >= 0 ? '+' : '';
                    
                    item.innerHTML = `
                        <div style="flex:1">
                            <div style="font-weight:bold; font-size:14px;">${d.reason || '无事由'}</div>
                            <div style="font-size:12px; color:#888;">${d.time || ''} · 操作人:${d.operator || '系统'}</div>
                        </div>
                        <div class="${pointsClass}">${pointsPrefix}${d.points}</div>
                    `;
                    listDiv.appendChild(item);
                });
            } else {
                listDiv.innerHTML = '<div style="text-align:center; padding:20px; color:#999;">无任何加扣分记录</div>';
            }

            document.getElementById('detailModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('show');
        }
        init();
    </script>
</body>
</html>
